<!DOCTYPE html>
<html>
<head>
  <title>Latihan Dasar</title>
</head>
<body>

<h1>Belajar JavaScript Dasar</h1>

<script>
 let hargaProduk = 150000; // harga per item
let jumlah = prompt("Masukkan jumlah produk yang dibeli:");

// cek input
if (jumlah === null || jumlah === "" || isNaN(jumlah)) {
  alert("Jumlah tidak valid");
} else {
  let total = hargaProduk * jumlah;
  alert("Total pembayaran: Rp " + total);
}
  
</script>

</body>
</html>
